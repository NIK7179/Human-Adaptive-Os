name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  swift-test:
    name: swift test (Linux, Swift 6.1)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Run tests (keystone fixture included)
        run: swift test
